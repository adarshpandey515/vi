<!DOCTYPE html>
<html lang="en">

<head>
  <title>Interactive Designer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" />
  <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
    integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous">
    </script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
    integrity="sha384-ApNbgh9B+1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous">
    </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
    integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous">
    </script>

  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }

    .container {
      max-width: 95% !important;
    }

    .table-responsive {
      max-height: 70vh;
      overflow: auto;
      border-radius: 6px;
    }

    #pageTable thead th {
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2;
      white-space: nowrap;
    }

    .pagination {
      justify-content: center;
      flex-wrap: wrap;
    }

    #pagination {
      gap: 4px;
    }

    #pagination .page-link {
      min-width: 38px;
      text-align: center;
    }

    .templates-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 12px;
      padding: 10px 0;
    }

    .btn i {
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <div class="container mt-4">
    <div class="card">
      <div class="card-body">
        <div class="row align-items-center" style="width: 100%; padding: 10px 0px; margin-left: 0px">
          <div class="col-lg-6">
            <h2>Template Details</h2>
          </div>
          <div class="col-lg-6 text-right">
            <!-- ✅ Back to Home Button -->
            <button class="btn btn-secondary mr-2" onclick="goBack()">
              <i class="fa fa-arrow-left"></i> Back to Home
            </button>

            <!-- ✅ Create New Template Button -->
            <a id="createNewLink" href="index.html" target="_blank" rel="noopener noreferrer" style="display:none;"></a>
            <button class="btn btn-primary" id="createNewBtn">
              <i class="fa fa-plus"></i> Create New Template
            </button>
          </div>
        </div>

        <div class="templates-toolbar">
          <div style="min-width: 260px; flex: 1;">
            <label for="searchInput">Search (ID / Name):</label>
            <input type="text" class="form-control" id="searchInput" placeholder="Type to search…" />
          </div>
          <div style="width: 160px;">
            <label for="pageSize">Rows per page:</label>
            <select id="pageSize" class="form-control">
              <option value="10" selected>10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
          <div class="text-muted" id="showingInfo" style="padding-bottom: 6px;">Showing 0–0 of 0</div>
        </div>

        <div class="table-responsive">
          <table class="table table-bordered mb-0" id="pageTable">
            <thead>
              <tr>
                <th>Template ID</th>
                <th>Template Name</th>
                <th>Edit Template</th>
                <th>Delete Template</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data will be populated here after fetching -->
            </tbody>
          </table>
        </div>

        <nav class="mt-2">
          <ul class="pagination" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>

  <script>
    let allpage = [];
    let filteredTemplates = [];
    const apiBase = "http://103.75.226.215:8081/api";
    const getAllUrl = `${apiBase}/getTemplate`;
    const deleteUrl = `${apiBase}/deleteTemplate/`;
    const getByIdUrl = `${apiBase}/getTemplate/`;

    let rowsPerPage = 10;
    let currentPage = 1;
    let searchTimer = null;

    function safeStr(val) {
      return (val == null) ? '' : String(val);
    }

    function escapeHtml(str) {
      return safeStr(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function updateShowingInfo() {
      const info = document.getElementById('showingInfo');
      if (!info) return;
      const total = filteredTemplates.length;
      if (!total) {
        info.textContent = 'Showing 0–0 of 0';
        return;
      }
      const startIndex = (currentPage - 1) * rowsPerPage;
      const endIndex = Math.min(total, startIndex + rowsPerPage);
      info.textContent = `Showing ${startIndex + 1}–${endIndex} of ${total}`;
    }

    // ✅ Back button navigation
    function goBack() {
      window.location.href = "index.html";
    }

    // ✅ Create new template (open fresh tab)
    document.getElementById("createNewBtn").addEventListener("click", function () {
      document.getElementById("createNewLink").click();
    });

    function applyFilters() {
      const q = safeStr(document.getElementById('searchInput')?.value).trim().toLowerCase();
      if (!q) {
        filteredTemplates = [...allpage];
      } else {
        filteredTemplates = allpage.filter(t => {
          const id = safeStr(t.id).toLowerCase();
          const name = safeStr(t.name).toLowerCase();
          return id.includes(q) || name.includes(q);
        });
      }

      currentPage = 1;
      populateTable();
    }

    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(filteredTemplates.length / rowsPerPage));
      currentPage = Math.min(Math.max(currentPage, 1), totalPages);

      const pagination = document.getElementById("pagination");
      if (!pagination) return;
      pagination.innerHTML = "";

      const createPageItem = ({ label, page, disabled = false, active = false, isEllipsis = false }) => {
        const li = document.createElement("li");
        li.className = `page-item ${disabled ? "disabled" : ""} ${active ? "active" : ""}`.trim();

        if (isEllipsis) {
          li.innerHTML = `<span class="page-link">…</span>`;
          return li;
        }

        const a = document.createElement("a");
        a.className = "page-link";
        a.href = "#";
        a.textContent = String(label);
        a.addEventListener("click", (e) => {
          e.preventDefault();
          if (disabled) return;
          currentPage = page;
          populateTable();
        });
        li.appendChild(a);
        return li;
      };

      pagination.appendChild(createPageItem({ label: "«", page: 1, disabled: currentPage === 1 }));
      pagination.appendChild(createPageItem({ label: "‹", page: currentPage - 1, disabled: currentPage === 1 }));

      const maxVisible = 7;
      if (totalPages <= maxVisible) {
        for (let p = 1; p <= totalPages; p++) {
          pagination.appendChild(createPageItem({ label: p, page: p, active: p === currentPage }));
        }
      } else {
        const firstPage = 1;
        const lastPage = totalPages;
        const windowSize = 2;
        const left = Math.max(2, currentPage - windowSize);
        const right = Math.min(totalPages - 1, currentPage + windowSize);

        pagination.appendChild(createPageItem({ label: firstPage, page: firstPage, active: currentPage === firstPage }));
        if (left > 2) pagination.appendChild(createPageItem({ isEllipsis: true }));

        for (let p = left; p <= right; p++) {
          pagination.appendChild(createPageItem({ label: p, page: p, active: p === currentPage }));
        }

        if (right < totalPages - 1) pagination.appendChild(createPageItem({ isEllipsis: true }));
        pagination.appendChild(createPageItem({ label: lastPage, page: lastPage, active: currentPage === lastPage }));
      }

      pagination.appendChild(createPageItem({ label: "›", page: currentPage + 1, disabled: currentPage === totalPages }));
      pagination.appendChild(createPageItem({ label: "»", page: totalPages, disabled: currentPage === totalPages }));
    }

    // ✅ Populate table (paged)
    function populateTable() {
      const tbody = document.querySelector("#pageTable tbody");
      tbody.innerHTML = "";

      const startIndex = (currentPage - 1) * rowsPerPage;
      const pageItems = filteredTemplates.slice(startIndex, startIndex + rowsPerPage);

      pageItems.forEach((item) => {
        const row = document.createElement("tr");
        row.setAttribute("data-id", item.id);
        row.innerHTML = `
          <td>${escapeHtml(item.id)}</td>
          <td>${escapeHtml(item.name)}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-info" type="button" data-action="edit" title="Edit Template">
              <i class="fa fa-pencil"></i>
            </button>
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-danger" type="button" data-action="delete" title="Delete Template">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        `;
        tbody.appendChild(row);

        const editBtn = row.querySelector('button[data-action="edit"]');
        if (editBtn) {
          editBtn.addEventListener('click', (e) => {
            e.preventDefault();
            editTemplate(item.id, safeStr(item.name));
          });
        }

        const delBtn = row.querySelector('button[data-action="delete"]');
        if (delBtn) {
          delBtn.addEventListener('click', (e) => {
            e.preventDefault();
            deleteTemplate(item.id);
          });
        }
      });

      renderPagination();
      updateShowingInfo();
    }

    //IndexedDB Details

    const DB_NAME = "TemplateEditorDB";
    const DB_VERSION = 1;
    const STORE_NAME = "pages";

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveToIndexedDB(key, value) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put(value, key);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }


    // ✅ Edit template
    function editTemplate(id, name) {

      const url = getByIdUrl + id;

      fetch(url)
        .then(response => response.json())
        .then(async data => {
         // console.log("Fetched template data:", data);

          await saveToIndexedDB("single-page", data.EditableHtml);

          localStorage.setItem('editTemplateId', data.id);
          localStorage.setItem('editTemplateName', data.name);

          window.location.href = "index.html";
        })
        .catch(error => {
          alert("Failed to load template for editing");
        });
    }

    // ✅ Delete template
    function deleteTemplate(id) {
      if (!confirm("Are you sure you want to delete this template?")) return;

      const url = deleteUrl + id;

      fetch(url, { method: "DELETE" })
        .then(response => {
          if (!response.ok) throw new Error("Failed to delete template");
          allpage = allpage.filter(item => item.id !== id);
          applyFilters();
          alert("Template deleted successfully");
        })
        .catch(error => {
          alert("Error deleting template");
        });
    }

    // UI bindings
    (function initUI() {
      const search = document.getElementById('searchInput');
      if (search) {
        search.addEventListener('input', () => {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(() => applyFilters(), 250);
        });
      }

      const pageSize = document.getElementById('pageSize');
      if (pageSize) {
        pageSize.addEventListener('change', () => {
          const v = parseInt(pageSize.value, 10);
          rowsPerPage = Number.isFinite(v) && v > 0 ? v : 10;
          currentPage = 1;
          populateTable();
        });
      }
    })();

    // ✅ Fetch all templates
    fetch(getAllUrl)
      .then(response => response.json())
      .then(data => {
        allpage = data;
        filteredTemplates = [...allpage];
        applyFilters();
      })
      .catch(error => console.error("Error fetching templates:", error));
  </script>
</body>

</html>
