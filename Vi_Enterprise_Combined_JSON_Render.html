<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vi Enterprise Billing - Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#e60000;--red-dark:#b30000;--red-light:#fef2f2;--bg:#fafafa;--card:#fff;--fg:#1a1a1a;--muted:#6b7280;--muted-bg:#f3f4f6;--border:#c9cdd3;--blue:#3b82f6;--blue-light:#eff6ff;--green:#22c55e;--green-light:#f0fdf4;--orange:#f59e0b;--orange-light:#fffbeb;--purple:#8b5cf6;--purple-light:#f5f3ff;--teal:#14b8a6;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 6px -1px rgba(0,0,0,.1);--shadow-lg:0 10px 25px -5px rgba(0,0,0,.15);--radius:8px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;overflow-x:hidden}
/* Scroll progress bar */
.scroll-prog{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--red),var(--orange),var(--red));z-index:200;width:0;transition:width .1s linear}
.header{height:56px;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(230,0,0,.3)}
.header .logo{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.5px;animation:logoPulse 3s ease infinite;cursor:pointer}
@keyframes logoPulse{0%,100%{text-shadow:0 0 8px rgba(255,255,255,.3)}50%{text-shadow:0 0 20px rgba(255,255,255,.6),0 0 40px rgba(255,255,255,.2)}}
.header .divider{width:1px;height:24px;background:rgba(255,255,255,.3)}
.header .title{color:#fff;font-size:14px;font-weight:600}.header .sub{color:rgba(255,255,255,.6);font-size:12px;margin-left:8px}
.header .spacer{flex:1}
.hbtn{background:rgba(255,255,255,.1);border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .25s ease;position:relative;overflow:hidden}.hbtn:hover{background:rgba(255,255,255,.25);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}.hbtn:active{transform:scale(.95)}
.header select{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 8px;border-radius:6px;font-size:12px;font-family:inherit;outline:none;transition:.2s}.header select:hover{background:rgba(255,255,255,.25)}
.header select option{color:#1a1a1a;background:#fff}
.header .acct{color:rgba(255,255,255,.7);font-size:12px}
.header .avatar{width:32px;height:32px;border-radius:50%;background:#fff;color:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all .3s ease;box-shadow:0 0 0 2px rgba(255,255,255,.3)}.header .avatar:hover{transform:scale(1.15) rotate(5deg);box-shadow:0 0 0 3px rgba(255,255,255,.6)}
.nav{background:linear-gradient(180deg,#fff 0%,#fafafa 100%);border-bottom:none;overflow-x:auto;position:sticky;top:56px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.06),0 1px 0 rgba(230,0,0,.05)}
.nav-inner{display:flex;min-width:max-content;gap:0;padding:0 12px;position:relative}
.nav-inner::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.tab{padding:14px 18px;font-size:12.5px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:7px;position:relative;overflow:hidden;letter-spacing:.01em;text-transform:none}
.tab:hover{color:#1a1a1a;background:linear-gradient(180deg,rgba(230,0,0,.02) 0%,rgba(230,0,0,.06) 100%);border-bottom-color:rgba(230,0,0,.2)}
.tab:hover .ic{transform:scale(1.1)}
.tab.active{color:var(--red);font-weight:700;border-bottom-color:transparent;background:linear-gradient(180deg,rgba(230,0,0,.03) 0%,rgba(230,0,0,.08) 100%)}
.tab.active::before{content:'';position:absolute;bottom:0;left:8px;right:8px;height:3px;background:linear-gradient(90deg,var(--red),#ff4444,var(--red));border-radius:3px 3px 0 0;animation:tabSlide .4s cubic-bezier(.34,1.56,.64,1)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:8px;background:var(--red);filter:blur(8px);opacity:.3;animation:tabGlow .4s ease .1s forwards}
.tab.active .ic{color:var(--red);filter:drop-shadow(0 0 3px rgba(230,0,0,.3))}
@keyframes tabSlide{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}
@keyframes tabGlow{from{opacity:0}to{opacity:.3}}
.main{padding:24px;max-width:1100px;margin:0 auto}
.page{display:none}.page.active{display:block}
/* DHTML: Staggered card entrance animations */
.page.active .card,.page.active .grid>div{opacity:0;transform:translateY(20px);animation:cardEntrance .5s ease forwards}
.page.active .card:nth-child(1),.page.active .grid>div:nth-child(1){animation-delay:.05s}
.page.active .card:nth-child(2),.page.active .grid>div:nth-child(2){animation-delay:.1s}
.page.active .card:nth-child(3),.page.active .grid>div:nth-child(3){animation-delay:.15s}
.page.active .card:nth-child(4),.page.active .grid>div:nth-child(4){animation-delay:.2s}
.page.active .card:nth-child(5),.page.active .grid>div:nth-child(5){animation-delay:.25s}
.page.active .card:nth-child(6),.page.active .grid>div:nth-child(6){animation-delay:.3s}
.page.active .card:nth-child(7),.page.active .grid>div:nth-child(7){animation-delay:.35s}
.page.active .card:nth-child(8),.page.active .grid>div:nth-child(8){animation-delay:.4s}
@keyframes cardEntrance{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.page.active h1{animation:headSlide .4s ease}
@keyframes headSlide{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
.card{background:var(--card);border:4px solid;border-image:conic-gradient(#1a237e 0deg 120deg,#b71c1c 120deg 240deg,#000 240deg 360deg) 1;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1)}.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-h{padding:16px 20px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#fff 0%,#fafafa 100%)}
.card-h h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-b{padding:20px}.card-b.c{padding:16px}
.bl-red{border-left:4px solid var(--red)}.bl-blue{border-left:4px solid var(--blue)}.bl-green{border-left:4px solid var(--green)}.bl-orange{border-left:4px solid var(--orange)}.bl-purple{border-left:4px solid var(--purple)}.bl-teal{border-left:4px solid var(--teal)}
.grid{display:grid;gap:16px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}
@media(max-width:768px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}}

.xs{font-size:12px}.sm{font-size:13px}.mt{color:var(--muted)}.tr{color:var(--red)}.tb{color:var(--blue)}.tg{color:var(--green)}.to{color:var(--orange)}.tp{color:var(--purple)}.fb{font-weight:700}.fs{font-weight:600}.up{text-transform:uppercase;letter-spacing:.5px}
/* Animated badge with pulse */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;border:1px solid var(--border);transition:all .2s}
.badge.red{background:var(--red-light);color:var(--red);border-color:#fca5a5;animation:badgePulse 2s ease infinite}.badge.blue{background:var(--blue-light);color:var(--blue);border-color:#93c5fd}.badge.green{background:var(--green-light);color:var(--green);border-color:#86efac}.badge.orange{background:var(--orange-light);color:var(--orange);border-color:#fcd34d}.badge.purple{background:var(--purple-light);color:var(--purple);border-color:#c4b5fd}
@keyframes badgePulse{0%,100%{opacity:1}50%{opacity:.7}}
table{width:100%;border-collapse:separate;border-spacing:0;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#fff;font-size:13px}
th{text-align:left;padding:10px 14px;font-weight:600;font-size:12px;color:var(--muted);border-bottom:2px solid var(--border);background:var(--muted-bg);text-transform:uppercase;letter-spacing:.03em}
td{padding:10px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover{background:#fafafa}tr.ck{cursor:pointer;transition:all .2s}tr.ck:hover{background:var(--blue-light);transform:scale(1.005)}tr.tot{background:var(--muted-bg);font-weight:600}
/* Section dividers & page headings */
h1{font-size:20px;font-weight:700;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border)}
h1 .s{font-size:14px;font-weight:400;color:var(--muted);display:block;margin-top:2px}
.section-divider{height:2px;background:linear-gradient(90deg,var(--red),var(--border),transparent);margin:24px 0;border-radius:2px}
/* Grid cards get consistent borders */
.grid>.card{border:4px solid;border-image:conic-gradient(#1a237e 0deg 120deg,#b71c1c 120deg 240deg,#000 240deg 360deg) 1}
.grid>.card:hover{}
/* DHTML Buttons with ripple */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--fg);font-family:inherit;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap;position:relative;overflow:hidden}.btn:hover{background:var(--muted-bg);transform:translateY(-1px);box-shadow:var(--shadow-md)}.btn:active{transform:scale(.96)}
.btn.pri{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;border-color:var(--red);box-shadow:0 2px 8px rgba(230,0,0,.3)}.btn.pri:hover{box-shadow:0 4px 16px rgba(230,0,0,.4);transform:translateY(-2px)}
.btn.blu{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;border-color:var(--blue)}.btn.grn{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;border-color:var(--green)}
.btn.gh{background:transparent;border-color:transparent}.btn.gh:hover{background:var(--muted-bg)}
.btn.s{padding:4px 10px;font-size:12px}.btn.l{padding:10px 24px;font-size:14px}
/* Ripple effect */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.4);transform:scale(0);animation:rippleAnim .6s linear;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
input,select.fi,textarea{border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;width:100%;font-family:inherit;color:var(--fg);background:#fff;outline:none;transition:all .25s ease}input:focus,select.fi:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);transform:scale(1.01)}
/* Animated progress bars */
.prog{height:8px;background:var(--muted-bg);border-radius:999px;overflow:hidden;position:relative}.prog::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.prog-f{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
/* Expandable with smooth animation */
.exp{cursor:pointer;transition:all .3s ease}.exp:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}.exp-c{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1),opacity .3s ease;opacity:0}.exp.open .exp-c{max-height:2000px;opacity:1}.chv{transition:transform .3s ease;display:inline-block;font-size:12px;color:var(--muted)}.exp.open .chv{transform:rotate(180deg)}
/* DHTML Modals with backdrop blur */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.mbg.active{display:flex;animation:bgFade .2s ease}
@keyframes bgFade{from{opacity:0}to{opacity:1}}
.mbox{background:#fff;border-radius:16px;padding:24px;max-width:500px;width:92%;max-height:85vh;overflow-y:auto;animation:modalBounce .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 25px 50px rgba(0,0,0,.25)}
@keyframes modalBounce{from{transform:scale(.8) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.mbox h3{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
/* Toast with slide + bounce */
.toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#1a1a1a,#333);color:#fff;padding:14px 22px;border-radius:12px;font-size:13px;z-index:300;display:none;box-shadow:0 12px 32px rgba(0,0,0,.3);max-width:360px;border-left:4px solid var(--green)}.toast.show{display:block;animation:toastIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes toastIn{from{transform:translateX(100px) scale(.8);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
/* Animated donut */
.donut{width:120px;height:120px;border-radius:50%;border:12px solid var(--muted-bg);position:relative;margin:0 auto;transition:border-color .5s}.donut .ctr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}.donut .ctr .p{font-size:20px;font-weight:700}.donut .ctr .l{font-size:10px;color:var(--muted)}
/* Smart Pay Link with gradient shimmer */
.spl{background:linear-gradient(135deg,var(--red-light),#fff5f5,var(--red-light));background-size:200% 200%;animation:gradShift 4s ease infinite;border:2px solid var(--red);border-radius:var(--radius);padding:20px;text-align:center}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.spl .qr{width:120px;height:120px;border:2px solid var(--fg);margin:12px auto;display:flex;align-items:center;justify-content:center;font-size:11px;background:#fff;border-radius:6px;transition:all .3s}.spl .qr:hover{transform:scale(1.05);box-shadow:var(--shadow-lg)}
.spl .lnk{background:var(--muted-bg);padding:10px 14px;border-radius:6px;font-size:12px;word-break:break-all;margin:12px 0;cursor:pointer;border:1px dashed var(--border);transition:all .2s}.spl .lnk:hover{background:var(--border);transform:scale(1.02)}
/* Vi App with glass effect */
.vi-app{background:linear-gradient(135deg,#e60000,#cc0000,#990000);border-radius:24px;padding:20px;color:#fff;max-width:280px;margin:0 auto;min-height:360px;box-shadow:0 20px 40px rgba(230,0,0,.3)}
.vi-app-c{background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;transition:all .3s ease;border:1px solid rgba(255,255,255,.1)}.vi-app-c:hover{background:rgba(255,255,255,.22);transform:translateX(4px);border-color:rgba(255,255,255,.3)}
.stepper{display:flex;align-items:center;gap:4px;margin-bottom:16px}.step{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;transition:all .3s}.step.a{background:var(--red);color:#fff;border-color:var(--red);animation:stepPulse 1.5s ease infinite}.step.d{background:var(--green);color:#fff;border-color:var(--green)}.step-l{flex:1;height:2px;background:var(--border);transition:background .3s}.step-l.d{background:var(--green)}
@keyframes stepPulse{0%,100%{box-shadow:0 0 0 0 rgba(230,0,0,.3)}50%{box-shadow:0 0 0 6px rgba(230,0,0,0)}}
.rsec{display:none}.rsec.active{display:block;animation:cardEntrance .4s ease}
.lt{color:var(--red);font-size:12px;cursor:pointer;font-weight:500;transition:all .2s}.lt:hover{text-decoration:underline;letter-spacing:.3px}.lt.b{color:var(--blue)}
.wm{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:#9ca3af;z-index:50}
/* Animated counter */
.counter{transition:all .3s}
/* Confetti container */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:400;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;top:-10px;animation:confettiFall 3s ease forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0);opacity:0}}
/* Floating particles */
.particle{position:fixed;border-radius:50%;pointer-events:none;opacity:0;z-index:-1;animation:floatParticle 8s ease infinite}
@keyframes floatParticle{0%{opacity:0;transform:translateY(100vh) scale(0)}25%{opacity:.15}75%{opacity:.1}100%{opacity:0;transform:translateY(-100px) scale(1)}}
/* Glow effect on hover for payment cards */
.glow-hover:hover{box-shadow:0 0 20px rgba(230,0,0,.15),var(--shadow-lg)}
/* Typewriter effect */
.typewriter{overflow:hidden;white-space:nowrap;border-right:2px solid var(--fg);animation:typing 2s steps(40) forwards,blink .7s step-end infinite}
@keyframes typing{from{width:0}to{width:100%}}@keyframes blink{50%{border-color:transparent}}
/* Animated number highlight */
.num-highlight{display:inline-block;transition:all .3s}.num-highlight:hover{transform:scale(1.1);color:var(--red)}
/* Skeleton loading */
.skeleton{background:linear-gradient(90deg,var(--muted-bg) 25%,#e8e8e8 50%,var(--muted-bg) 75%);background-size:200% 100%;animation:skeletonLoad 1.5s ease infinite}
@keyframes skeletonLoad{from{background-position:200% 0}to{background-position:-200% 0}}
/* SVG icon helper */
.ic{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:middle}
.ic svg{width:100%;height:100%;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.ic-lg{width:24px;height:24px}.ic-xl{width:32px;height:32px}.ic-2x{width:40px;height:40px}
/* Hero banner */
.hero-banner{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:16px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:32px;min-height:180px}
.hero-banner::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(230,0,0,.2),transparent 70%)}
.hero-banner::after{content:'';position:absolute;bottom:-30%;left:10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%)}
.hero-banner>*{position:relative;z-index:1}
/* Visual placeholder images */
.img-placeholder{background:linear-gradient(135deg,var(--muted-bg),#e2e8f0);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;overflow:hidden;position:relative}
.img-placeholder::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.3) 50%,transparent 60%);animation:imgShimmer 3s ease infinite}
@keyframes imgShimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
/* QR code visual */
.qr-visual{width:120px;height:120px;background:#fff;border:2px solid var(--fg);border-radius:8px;margin:0 auto;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.qr-visual::before{content:'';position:absolute;inset:8px;background:repeating-conic-gradient(var(--fg) 0% 25%, transparent 0% 50%) 50% / 10px 10px;opacity:.7}
.qr-visual::after{content:'Vi';position:absolute;background:#fff;padding:4px 8px;font-size:14px;font-weight:900;color:var(--red);border-radius:4px;z-index:1}
/* App store badges */
.app-badge{display:inline-flex;align-items:center;gap:6px;background:#000;color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;cursor:pointer;transition:all .2s;border:1px solid #333}.app-badge:hover{background:#222;transform:scale(1.03)}
.app-badge .ab-icon{font-size:16px}

/* ViTM Chat Widget */
.vitm-fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:var(--red);border:2px solid #fff;box-shadow:0 4px 20px rgba(230,0,0,.4);cursor:pointer;z-index:250;display:flex;align-items:center;justify-content:center;transition:all .3s ease;overflow:hidden}.vitm-fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(230,0,0,.5)}.vitm-fab img{width:44px;height:44px;object-fit:contain}
.vitm-chat{position:fixed;bottom:24px;right:24px;width:380px;height:520px;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);z-index:260;display:none;flex-direction:column;overflow:hidden;background:#fff;border:1px solid var(--border);animation:modalBounce .4s cubic-bezier(.34,1.56,.64,1)}.vitm-chat.open{display:flex}
.vitm-chat-hdr{background:linear-gradient(135deg,var(--red),var(--red-dark));padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.vitm-chat-hdr .av{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}.vitm-chat-hdr .av img{width:28px;height:28px;object-fit:contain}
.vitm-chat-hdr .info{flex:1;color:#fff}.vitm-chat-hdr .info .nm{font-size:13px;font-weight:700}.vitm-chat-hdr .info .st{font-size:11px;opacity:.7;display:flex;align-items:center;gap:4px}.vitm-chat-hdr .info .st .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:badgePulse 2s ease infinite}
.vitm-chat-hdr button{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;padding:4px;transition:.2s}.vitm-chat-hdr button:hover{color:#fff}
.vitm-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:#f9fafb}
.vitm-msg{display:flex;gap:8px;max-width:85%}.vitm-msg.user{align-self:flex-end;flex-direction:row-reverse}
.vitm-msg .bub{padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5}.vitm-msg.bot .bub{background:#fff;border:1px solid var(--border);border-radius:12px 12px 12px 2px;box-shadow:0 1px 2px rgba(0,0,0,.04)}.vitm-msg.user .bub{background:var(--red);color:#fff;border-radius:12px 12px 2px 12px}
.vitm-msg .mav{width:24px;height:24px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;margin-top:2px}.vitm-msg .mav img{width:18px;height:18px;object-fit:contain}
.vitm-typing{display:flex;gap:4px;padding:8px 12px}.vitm-typing span{width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:bounce .6s ease infinite}.vitm-typing span:nth-child(2){animation-delay:.15s}.vitm-typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.vitm-qas{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border);background:#fff}
.vitm-qa{font-size:11px;padding:4px 10px;border-radius:999px;border:1px solid rgba(230,0,0,.3);color:var(--red);background:transparent;cursor:pointer;font-family:inherit;transition:.2s}.vitm-qa:hover{background:var(--red-light)}
.vitm-input{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:8px;background:#fff}
.vitm-input input{flex:1;border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:13px;font-family:inherit;outline:none;transition:.2s}.vitm-input input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.vitm-input button{width:32px;height:32px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}.vitm-input button:hover{opacity:.85}
.vitm-foot{padding:4px;text-align:center;border-top:1px solid var(--border);background:#fff}.vitm-foot span{font-size:10px;color:var(--muted)}
</style>
